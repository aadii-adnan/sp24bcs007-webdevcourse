<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMAZON</title>
    <link rel="stylesheet" href="amazon.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header>
        <div class="nav-bar">
            <div class="nav-logo border">
                <div class="logo">
                    
                </div>
            </div>

            <div class="nav-address border">
                <p class="add-1"> Deliver to </p>
                <div class="add-icon">
                    <i class="fa-solid fa-location-dot"></i>
                    <p class="add-2">Pakistan</p>
                </div>
            </div>

            <div class="nav-search">
                <select class="search-select">
                   <option>All</option>>
                </select>
                <input placeholder="Search Products" class="search-input">
                <div class="search-icon">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>

            </div>

            <div class="nav-signin border">
                <p><span>Hello, Sign in</span></p>
                <p class="nav-second">Account & List</p>
            </div>


            <div class="nav-recover border">
                <p><span>Returns</span></p>
                <p class="nav-second">& Order</p>
            </div>

            <div class="nav-cart border">
                <i class="fa-solid fa-cart-flatbed"></i>
                Cart
            </div>

        </div>

        <div class="panel">
            <div class="panel-all">
                <i class="fa-solid fa-bars"></i>
                 All
            </div>

            <div class="panel-option">
                <p>Todays Deals</p>
                <p>Gift Cards</p>

                <p>Sell</p>

                <p>Registery</p>

                <p>Prime Videos</p>
                <p>Customer services</p>


            </div>

            <div class="panel-deals">
                Shop deals in Electronics
            </div>
        </div>

    </header>

    <div class="hero-section">
        <div class="hero-msg">
            <p>You are on Amazon.com. here you find the best of the best products. <a>Click here to go to Adnan</a></p>
        </div>

    </div>
    
</body>
</html>
